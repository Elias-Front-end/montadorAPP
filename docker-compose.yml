version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: montador-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: montador
      POSTGRES_PASSWORD: montador_password
      POSTGRES_DB: montador_conecta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U montador"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: montador-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://montador:montador_password@postgres:5432/montador_conecta
      JWT_SECRET: montador-conecta-secret-key-production
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: montador-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

volumes:
  postgres_data:
